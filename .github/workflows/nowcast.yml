name: Nowcasting Public

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  nowcast:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ICON data
        uses: actions/cache@v4
        with:
          path: data/icon/icon_cache.npz
          key: icon-cache-${{ github.run_id }}
          restore-keys: |
            icon-cache-

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgeos-dev libproj-dev libhdf5-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run nowcasting
        run: |
          python run_nowcast.py --lightning-sec 20

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/maps/
          git add -f data/output/maps/nowcast_latest.png data/output/maps/blended_latest.png data/output/maps/meta.json
          git diff --staged --quiet || git commit -m "Nowcast $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push