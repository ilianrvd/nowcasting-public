name: Nowcasting Public

on:
  #schedule:
   # - cron: '*/10 * * * *'    # На всеки 10 мин
  workflow_dispatch:           # Ръчно стартиране

permissions:
  contents: write
  pages: write

jobs:
  nowcast:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run nowcasting
        run: |
          python run_nowcast.py --lightning-sec 20

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/maps/*.png data/output/maps/meta.json
          git diff --staged --quiet || git commit -m "Nowcast $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
